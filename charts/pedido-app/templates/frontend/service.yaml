apiVersion: v1
kind: Service
metadata:
  name: {{ include "pedido-app.fullname" . }}-frontend
  labels:
    app.kubernetes.io/component: frontend
    {{- include "pedido-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: frontend
    {{- include "pedido-app.selectorLabels" . | nindent 4 }}
