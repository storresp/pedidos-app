apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pedido-app.fullname" . }}-backend-config
  labels:
    app.kubernetes.io/component: backend
    {{- include "pedido-app.labels" . | nindent 4 }}
data:
  DB_HOST: {{ tpl .Values.backend.config.dbHost . | quote }}
  DB_PORT: {{ .Values.backend.config.dbPort | quote }}
  DB_NAME: {{ .Values.postgresql.auth.database | quote }}
